name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  GOFLAGS: -count=1

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [gateway, attestation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Check formatting
        working-directory: services/${{ matrix.crate }}
        run: cargo fmt --check
      - name: Clippy
        working-directory: services/${{ matrix.crate }}
        run: cargo clippy -- -D warnings

  test-rust:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate: [gateway, attestation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Run tests
        working-directory: services/${{ matrix.crate }}
        run: cargo test

  lint-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/checkin-dao
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/checkin-dao

  build-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/checkin-dao
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build -o /dev/null ./...

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - dockerfile: docker/Dockerfile.gateway
            image: gateway
          - dockerfile: docker/Dockerfile.attestation
            image: attestation
          - dockerfile: docker/Dockerfile.checkin-dao
            image: checkin-dao
          - dockerfile: docker/Dockerfile.analytics
            image: analytics
          - dockerfile: docker/Dockerfile.frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          tags: safety-dao/${{ matrix.service.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
